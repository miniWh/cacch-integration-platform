spring:
  application:
    name: cacch-integration-platform

  profiles:
    active: dev

---
# ==================== 开发环境 ====================
spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: jdbc:postgresql://127.0.0.1:5432/cacch_integration
    username: your_username
    password: your_password
    driver-class-name: org.postgresql.Driver

  data:
    redis:
      host: 127.0.0.1
      port: 6379
      password: your_redis_password
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 1

mybatis-plus:
  global-config:
    db-config:
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true

logging:
  level:
    com.cacch.integration: DEBUG

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info

---
# ==================== 测试环境 ====================
spring:
  config:
    activate:
      on-profile: test

  datasource:
    url: jdbc:postgresql://127.0.0.1:5432/cacch_integration_test
    username: your_username
    password: your_password
    driver-class-name: org.postgresql.Driver

  data:
    redis:
      host: 127.0.0.1
      port: 6379
      password: your_redis_password
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 1

mybatis-plus:
  global-config:
    db-config:
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true

logging:
  level:
    com.cacch.integration: INFO

server:
  port: 8081

---
# ==================== 生产环境 ====================
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: ${DB_URL:jdbc:postgresql://127.0.0.1:5432/cacch_integration}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD}
      lettuce:
        pool:
          max-active: 16
          max-idle: 16
          min-idle: 4

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

mybatis-plus:
  global-config:
    db-config:
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true

logging:
  level:
    com.cacch.integration: WARN
    root: WARN

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
