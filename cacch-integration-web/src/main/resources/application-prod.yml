# ==================== 生产环境配置 ====================
# 安全要求：密码、密钥等敏感信息严禁在此文件中明文写入，
# 必须通过环境变量注入。本地默认值仅用于应急，上线前需覆盖。
#
# 角色：all = HTTP 接口 + 定时任务（本进程同时承担调度，勿再在测试环境开调度）

app:
  role: all

spring:
  # ---------- PostgreSQL 数据源 ----------
  datasource:
    # 数据库地址通过环境变量 DB_URL 注入
    # 部署时务必设置：export DB_URL=jdbc:postgresql://your-host:5432/cacch_integration
    url: jdbc:postgresql://10.80.86.93:5432/cdb
    # 数据库用户名，由运维通过环境变量注入
    username: esb
    # 数据库密码，由运维通过环境变量注入（严禁明文写在文件中）
    password: esb
    driver-class-name: org.postgresql.Driver

  # ---------- Redis 配置 ----------
  data:
    redis:
      # 生产 Redis 地址通过环境变量 REDIS_HOST 注入
      host: 10.80.86.95
      # Redis 端口
      port: 6379
      # Redis 密码，通过环境变量 REDIS_PASSWORD 注入
      password: cacredis0826
      lettuce:
        pool:
          # 最大活跃连接数（生产环境适当放大）
          max-active: 16
          # 最大空闲连接数（减少频繁创建/销毁开销）
          max-idle: 16
          # 最小空闲连接数（预创建 4 个，应对突发流量）
          min-idle: 4

  # ---------- Flyway：生产环境禁止自动迁移（与 test 共用库，迁移仅由 test profile 执行） ----------
  flyway:
    enabled: false

# ---------- 服务端口 ----------
server:
  port: 8080

# ---------- Actuator 健康监控 ----------
# ---------- 企业微信多应用配置 ----------
# 生产环境 List 结构无法逐字段用简单 ${ENV} 注入，使用 JSON 字符串整体注入
# 部署时运维设置环境变量：
#   export WECOM_APPS_JSON='[{"corpid":"ww001","app-key":"address-book","secret":"xxx"},...]'
#
# Spring Boot 原生支持将 JSON 格式的环境变量值自动反序列化为 List<WeComAppConfig>
wecom:
  apps:
    # 泰禾 — 自建应用（智能表格等文档 API 使用此配置鉴权）
    - corpid: ww0ae0c799548c75bd
      app-key: self-built
      secret: rJ4TpwlW7s1Z64xBHgUd35zNOUIQ14figIs5sfgqgaI
    # 泰禾 — 通讯录（读取成员姓名等）
    - corpid: ww0ae0c799548c75bd
      app-key: address-book
      secret: _V82sWWijuUgDVsNcssQcwbFQIyu9FKr1L_xH6L2Q-0

# ---------- 勤策 CRM OpenAPI ----------
crm:
  base-url: ${CRM_BASE_URL:https://crm.cacch.com:50001}
  open-id: ${CRM_OPEN_ID:8858965636174056137}
  app-key: ${CRM_APP_KEY:0H4aAHGY0htrsglQKm}
  employee-base-url: ${CRM_EMPLOYEE_BASE_URL:https://crm.cacch.com:50001}
  collect:
    cron: "0 */5 * * * ?"
    batch-size: 100
    detail-page-size: 100
    detail-retry-batch-size: 100
  sync:
    cron: "0 */5 * * * ?"
    batch-size: 100
    max-retry: 3

# ---------- 致远 OA REST ----------
# 密钥建议由环境变量注入：OA_BASE_URL / OA_REST_USER_NAME / OA_REST_PASSWORD
oa:
  base-url: ${OA_BASE_URL:http://10.80.64.18:900}
  rest-user-name: ${OA_REST_USER_NAME:zhouhufu}
  rest-password: ${OA_REST_PASSWORD:1a884fa3-affe-4533-8e1d-3af3c162361e}
  default-login-name: ${OA_DEFAULT_LOGIN_NAME:zhouhongfu}
  token-ttl-seconds: ${OA_TOKEN_TTL_SECONDS:840}
  template-code: ${OA_TEMPLATE_CODE:CRM_ZYXS_001}

# ---------- 腾讯会议 REST API（智能纪要） ----------
# 未配置时会继承 application.yml 的 enabled=false，导致正式环境跳过纪要拉取。
# 密钥建议由环境变量覆盖：TENCENT_MEETING_APP_ID / SDK_ID / SECRET_ID / SECRET_KEY
tencent-meeting:
  enabled: ${TENCENT_MEETING_ENABLED:true}
  app-id: ${TENCENT_MEETING_APP_ID:311670505}
  sdk-id: ${TENCENT_MEETING_SDK_ID:32470112674}
  secret-id: ${TENCENT_MEETING_SECRET_ID:fGwpRaVWxDNY1DYuRTki6OFHdMDNyIT3}
  secret-key: ${TENCENT_MEETING_SECRET_KEY:gEKLMzKjWSRQPr9gZZGEIHZHa6jQBXFlCNMMqtp47YjE3NhC}
  operator-id-type: 1
  default-operator-id: ${TENCENT_MEETING_DEFAULT_OPERATOR_ID:}
  smart-minutes:
    text-type: 2
    llm: 1
    minute-type: 1
    lang: default

# ---------- Actuator 健康监控 ----------
management:
  endpoints:
    web:
      exposure:
        # 生产环境额外暴露 metrics 用于 Prometheus 等监控系统采集
        include: health,info,metrics
