# ==================== Cacch 集成中台 — 公共配置 ====================
# 本文件存放所有环境共用的配置项
# 环境差异化配置请分别编辑 application-{profile}.yml

spring:
  application:
    # 服务名称，用于注册中心、日志标识等
    name: cacch-integration-platform

  profiles:
    # 默认激活的环境：test（本地开发/测试）、prod（生产上线）
    active: test

  flyway:
    # 默认关闭：仅 test profile 开启迁移（test/prod 共用同一数据库，生产禁止自动改表）
    enabled: false
    locations: classpath:db/migration
    baseline-version: 0
    validate-on-migrate: true
    encoding: UTF-8
    clean-disabled: true

# ==================== MyBatis-Plus 全局配置（所有环境共用） ====================
mybatis-plus:
  global-config:
    db-config:
      # 逻辑删除字段名（对应数据库表中的 is_deleted 列）
      logic-delete-field: isDeleted
      # 逻辑已删除值：1 表示已删除
      logic-delete-value: 1
      # 逻辑未删除值：0 表示正常
      logic-not-delete-value: 0
  configuration:
    # 自动驼峰转换：数据库下划线字段 ←→ Java 驼峰属性
    # 示例：api_key_name → apiKeyName
    map-underscore-to-camel-case: true

# 日志统一由 logback-spring.xml 管理，请勿在此配置 logging.level / logging.file

# ==================== 会议同步定时任务 Cron（公共占位） ====================
meeting:
  sync:
    master-cron: "0 */3 * * * ?"
    meeting-cron: "0 */3 * * * ?"
    todo-cron: "0 */3 * * * ?"
    minutes-cron: "0 */3 * * * ?"
    minutes-end-buffer-minutes: 5
    minutes-max-wait-hours: 48

# ==================== 腾讯会议 REST API（智能纪要） ====================
tencent-meeting:
  enabled: false
  app-id: placeholder
  sdk-id: placeholder
  secret-id: placeholder
  secret-key: placeholder
  operator-id-type: 1
  default-operator-id:
  smart-minutes:
    text-type: 2
    llm: 1
    minute-type: 1
    lang: default

# ==================== 企业微信多应用配置（公共占位） ====================
# 实际值请在 application-{profile}.yml 中覆盖
# 配置格式：List of App Config，一个 (corpid, app-key) 唯一标识一个 token 槽位
wecom:
  apps:
    - corpid: placeholder
      app-key: self-built
      secret: placeholder
    - corpid: placeholder
      app-key: address-book
      secret: placeholder
  # 群机器人 Webhook — 定时同步异常告警（key 从企微群机器人 Webhook 地址中获取）
  webhook:
    enabled: false
    key: "4432e2bc-1a69-4fc3-945a-5acb52e399c5"
    mention-mobiles: [ ]
    alert-interval-seconds: 1800
