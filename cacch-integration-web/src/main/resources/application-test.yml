# ==================== 测试环境配置 ====================
# 角色：仅 API。定时任务由正式环境（app.role=all）执行，避免与正式抢跑同一套企微。
# 联调同步请调用 /api/v1/meeting/sync/* 手动触发。

app:
  role: api

spring:
  # ---------- PostgreSQL 数据源（与 prod 共用同一库 cdb） ----------
  datasource:
    url: jdbc:postgresql://10.80.86.93:5432/cdb
    username: esb
    password: esb
    driver-class-name: org.postgresql.Driver

  # ---------- Redis 配置 ----------
  data:
    redis:
      host: 10.80.86.95
      port: 6379
      password: cacredis0826
      lettuce:
        pool:
          # 最大活跃连接数
          max-active: 8
          # 最大空闲连接数
          max-idle: 8
          # 最小空闲连接数（0 表示不预创建）
          min-idle: 0

  # ---------- Flyway 数据库迁移（test/prod 共用同一库，仅 test 启动时执行） ----------
  flyway:
    enabled: true
    # 已有表结构的数据库首次接入 Flyway 时自动 baseline，再执行未运行的脚本
    baseline-on-migrate: true
    # 禁止 clean（共用库，防止误删数据）
    clean-disabled: true

# ---------- MyBatis-Plus 测试环境：SQL 日志走 SLF4J（级别见 logback-spring.xml test profile） ----------

# ---------- 服务端口 ----------
server:
  # 测试环境使用 8081，避免与生产 8080 冲突
  port: 8081

